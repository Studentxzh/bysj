<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>发布教材 - 校园二手教材平台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="auth-container">
  <div class="auth-card auth-card-wide">
    <div class="auth-title">发布二手教材</div>
    <div class="auth-subtitle">请填写教材基本信息，发布后其他同学即可在列表中看到</div>

    <form id="publishForm">
      <div class="form-field">
        <label for="title">书名 *</label>
        <input id="title" name="title" required>
      </div>
      <div class="form-field">
        <label for="author">作者</label>
        <input id="author" name="author">
      </div>
      <div class="form-field">
        <label for="publisher">出版社</label>
        <input id="publisher" name="publisher">
      </div>
      <div class="form-field">
        <label for="publishYear">出版年份 / 版次</label>
        <input id="publishYear" name="publishYear">
      </div>
      <div class="form-field">
        <label for="courseName">适用课程</label>
        <input id="courseName" name="courseName">
      </div>
      <div class="form-field">
        <label for="conditionLevel">新旧程度</label>
        <input id="conditionLevel" name="conditionLevel" placeholder="如：九成新">
      </div>
      <div class="form-field">
        <label for="transferType">流转类型 *</label>
        <select id="transferType" name="transferType" required>
          <option value="SALE">出售</option>
          <option value="FREE">免费赠送</option>
          <option value="BORROW">只借不卖</option>
        </select>
      </div>
      <div class="form-field">
        <label for="price">价格（元，仅出售时填写）</label>
        <input id="price" name="price" type="number" step="0.01" min="0">
      </div>
      <div class="form-field">
        <label for="coverFile">上传封面（可选）</label>
        <input id="coverFile" name="coverFile" type="file" accept="image/*">
      </div>
      <div class="form-field">
        <label for="description">描述说明</label>
        <textarea id="description" name="description" rows="3" style="width:100%;padding:9px 10px;border-radius:8px;border:1px solid #cbd5e1;"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">发布教材</button>
      <div class="form-footer">
        <span id="publishMessage"></span>
        <a href="index.html">返回列表</a>
      </div>
    </form>
  </div>
</div>
<script src="assets/app.js"></script>
</body>
</html>
