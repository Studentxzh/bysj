<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员后台 - 校园二手教材平台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">管理员后台</div>
    <nav class="admin-nav">
      <button id="tabUsers" class="active" onclick="switchAdminTab('users')">用户管理</button>
      <button id="tabBooks" onclick="switchAdminTab('books')">教材管理</button>
    </nav>
    <button class="btn btn-ghost" onclick="location.href='login.html'">退出</button>
  </aside>
  <main class="admin-content">
    <section id="panelUsers">
      <h2>用户管理</h2>
      <div class="table-wrapper" style="margin-bottom:16px;">
        <form id="adminCreateUserForm">
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;">
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="newUsername">账号 *</label>
              <input id="newUsername" name="username" required>
            </div>
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="newPassword">初始密码 *</label>
              <input id="newPassword" name="password" required>
            </div>
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="newRealName">姓名</label>
              <input id="newRealName" name="realName">
            </div>
            <div class="form-field" style="min-width:120px;margin-bottom:0;">
              <label for="newRole">角色</label>
              <select id="newRole" name="role">
                <option value="student">学生</option>
                <option value="admin">管理员</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">新增用户</button>
            <span id="adminCreateUserMsg" style="font-size:12px;color:#6b7280;margin-left:8px;"></span>
          </div>
        </form>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>账号</th>
            <th>姓名</th>
            <th>角色</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminUserTbody">
          </tbody>
        </table>
      </div>
    </section>
    <section id="panelBooks" style="display:none;">
      <h2>教材管理</h2>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>书名</th>
            <th>流转类型</th>
            <th>价格</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminBookTbody">
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src="assets/app.js"></script>
</body>
</html>
