<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>管理员后台 - 校园二手教材平台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-title">管理员后台</div>
    <nav class="admin-nav">
      <button id="tabUsers" class="active" onclick="switchAdminTab('users')">管理员管理</button>
      <button id="tabStudents" onclick="switchAdminTab('students')">学生管理</button>
      <button id="tabBooks" onclick="switchAdminTab('books')">教材管理</button>
      <button id="tabAnnouncements" onclick="switchAdminTab('announcements')">公告管理</button>
      <button id="tabComments" onclick="switchAdminTab('comments')">评论管理</button>
      <button id="tabReports" onclick="switchAdminTab('reports')">举报管理</button>
    </nav>
    <button class="btn btn-ghost" onclick="location.href='login.html'">退出</button>
  </aside>
  <main class="admin-content">
    <section id="panelUsers">
      <h2>管理员管理</h2>
      <p style="font-size:13px;color:#6b7280;margin:0 0 12px;">仅维护管理员账号；学生请在「学生管理」中操作。</p>
      <div class="table-wrapper" style="margin-bottom:16px;">
        <form id="adminCreateUserForm">
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;">
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="newUsername">账号 *</label>
              <input id="newUsername" name="username" required>
            </div>
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="newPassword">初始密码 *</label>
              <input id="newPassword" name="password" required>
            </div>
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="newRealName">姓名</label>
              <input id="newRealName" name="realName">
            </div>
            <button type="submit" class="btn btn-primary">新增管理员</button>
            <span id="adminCreateUserMsg" style="font-size:12px;color:#6b7280;margin-left:8px;"></span>
          </div>
        </form>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>账号</th>
            <th>姓名</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminUserTbody">
          </tbody>
        </table>
      </div>
    </section>
    <section id="panelStudents" style="display:none;">
      <h2>学生管理</h2>
      <div class="table-wrapper" style="margin-bottom:16px;">
        <form id="adminCreateStudentForm">
          <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;">
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="stuUsername">账号 *</label>
              <input id="stuUsername" name="username" required>
            </div>
            <div class="form-field" style="min-width:140px;margin-bottom:0;">
              <label for="stuPassword">初始密码 *</label>
              <input id="stuPassword" name="password" required>
            </div>
            <div class="form-field" style="min-width:120px;margin-bottom:0;">
              <label for="stuRealName">姓名</label>
              <input id="stuRealName" name="realName">
            </div>
            <div class="form-field" style="min-width:120px;margin-bottom:0;">
              <label for="stuPhone">手机</label>
              <input id="stuPhone" name="phone">
            </div>
            <div class="form-field" style="min-width:120px;margin-bottom:0;">
              <label for="stuCollege">学院</label>
              <input id="stuCollege" name="college">
            </div>
            <div class="form-field" style="min-width:120px;margin-bottom:0;">
              <label for="stuMajor">专业</label>
              <input id="stuMajor" name="major">
            </div>
            <div class="form-field" style="min-width:100px;margin-bottom:0;">
              <label for="stuClassName">班级</label>
              <input id="stuClassName" name="className">
            </div>
            <button type="submit" class="btn btn-primary">新增学生</button>
            <span id="adminCreateStudentMsg" style="font-size:12px;color:#6b7280;margin-left:8px;"></span>
          </div>
        </form>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>账号</th>
            <th>姓名</th>
            <th>手机</th>
            <th>学院</th>
            <th>专业</th>
            <th>班级</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminStudentTbody">
          </tbody>
        </table>
      </div>
    </section>
    <section id="panelBooks" style="display:none;">
      <h2>教材管理</h2>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>书名</th>
            <th>流转类型</th>
            <th>价格</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminBookTbody">
          </tbody>
        </table>
      </div>
    </section>
    <section id="panelAnnouncements" style="display:none;">
      <h2>公告管理</h2>
      <p style="font-size:13px;color:#6b7280;margin:0 0 12px;">启用状态的公告将按排序数字从小到大展示在首页；数字相同则新发布的靠后。</p>
      <div class="table-wrapper" style="margin-bottom:16px;">
        <form id="adminAnnouncementForm">
          <input type="hidden" id="adminAnnouncementId" name="id" value="">
          <div style="display:flex;flex-direction:column;gap:10px;max-width:640px;">
            <div class="form-field" style="margin-bottom:0;">
              <label for="annTitle">标题 *</label>
              <input id="annTitle" name="title" required maxlength="200">
            </div>
            <div class="form-field" style="margin-bottom:0;">
              <label for="annContent">正文</label>
              <textarea id="annContent" name="content" rows="4" style="width:100%;min-height:88px;padding:8px 10px;border-radius:8px;border:1px solid #cbd5e1;font-family:inherit;font-size:14px;"></textarea>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;">
              <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;">
                <input type="checkbox" id="annEnabled" name="enabled" checked>
                在首页展示
              </label>
              <div class="form-field" style="margin-bottom:0;min-width:120px;">
                <label for="annSort">排序（越小越靠前）</label>
                <input id="annSort" name="sortOrder" type="number" value="0" style="width:100%;">
              </div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
              <button type="submit" class="btn btn-primary" id="adminAnnouncementSubmit">发布公告</button>
              <button type="button" class="btn btn-ghost" id="adminAnnouncementReset">清空</button>
              <span id="adminAnnouncementMsg" style="font-size:12px;color:#6b7280;"></span>
            </div>
          </div>
        </form>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>标题</th>
            <th>排序</th>
            <th>展示</th>
            <th>更新时间</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminAnnouncementTbody">
          </tbody>
        </table>
      </div>
    </section>
    <section id="panelComments" style="display:none;">
      <h2>评论管理</h2>
      <p style="font-size:13px;color:#6b7280;margin:0 0 12px;">可隐藏不当评论或删除；隐藏后前台不再展示。</p>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>教材</th>
            <th>用户</th>
            <th>层级</th>
            <th>内容摘要</th>
            <th>状态</th>
            <th>时间</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminCommentTbody">
          </tbody>
        </table>
      </div>
    </section>
    <section id="panelReports" style="display:none;">
      <h2>举报管理</h2>
      <p style="font-size:13px;color:#6b7280;margin:0 0 12px;">处理举报时可填写备注；驳回表示经核实不成立。</p>
      <div class="table-wrapper">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>教材</th>
            <th>举报人</th>
            <th>类型</th>
            <th>说明</th>
            <th>状态</th>
            <th>备注</th>
            <th>时间</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody id="adminReportTbody">
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<script src="assets/app.js"></script>
</body>
</html>
