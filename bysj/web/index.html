<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>教材列表 - 校园二手教材平台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="app-logo">校园二手教材平台</div>
    <div class="app-header-right">
      <div class="search-box">
        <input id="searchInput" placeholder="按书名搜索教材">
      </div>
      <button class="btn btn-ghost" style="margin-right:4px;" onclick="location.href='profile.html'">个人中心</button>
      <button class="btn btn-primary" style="margin-right:8px;" onclick="location.href='publish.html'">发布教材</button>
      <button class="btn btn-ghost" onclick="location.href='login.html'">退出登录</button>
    </div>
  </header>
  <main class="app-main">
    <div class="card-grid" id="bookGrid"></div>
    <div id="pager" class="pager-bar">
      <button class="btn btn-ghost" id="btnPrev">上一页</button>
      <span id="pagerInfo" style="font-size:13px;color:#6b7280;">第 1 页</span>
      <select id="pageSizeSelect" style="padding:6px 12px;border-radius:999px;border:1px solid #cbd5e1;background:#ffffff;font-size:13px;">
        <option value="20">每页 20 个</option>
        <option value="50">每页 50 个</option>
        <option value="100">每页 100 个</option>
      </select>
      <button class="btn btn-ghost" id="btnNext">下一页</button>
    </div>
  </main>
</div>
<script src="assets/app.js?v=2"></script>
</body>
</html>
