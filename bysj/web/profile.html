<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>个人中心 - 校园二手教材平台</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <div class="app-logo" onclick="location.href='index.html'" style="cursor:pointer;">校园二手教材平台</div>
    <div class="app-header-right">
      <button class="btn btn-ghost" style="margin-right:4px;" onclick="location.href='index.html'">返回首页</button>
      <button class="btn btn-ghost" onclick="location.href='login.html'">退出登录</button>
    </div>
  </header>
  <main class="app-main">
    <div class="profile-layout">
      <section class="profile-card">
        <h2 class="profile-title">基本信息</h2>
        <p class="profile-line"><span>账号：</span><span id="profileUsername"></span></p>
        <p class="profile-line"><span>姓名：</span><span id="profileRealName"></span></p>
        <p class="profile-line"><span>角色：</span><span id="profileRole"></span></p>
      </section>

      <section class="profile-card">
        <h2 class="profile-title">修改姓名</h2>
        <form id="profileNameForm">
          <div class="form-field">
            <label for="profileRealNameInput">新姓名</label>
            <input id="profileRealNameInput" name="realName" required>
          </div>
          <button type="submit" class="btn btn-primary">保存姓名</button>
          <span id="profileNameMsg" class="profile-msg"></span>
        </form>
      </section>

      <section class="profile-card">
        <h2 class="profile-title">修改密码</h2>
        <form id="profilePwdForm">
          <div class="form-field">
            <label for="oldPassword">原密码</label>
            <input id="oldPassword" name="oldPassword" type="password" required>
          </div>
          <div class="form-field">
            <label for="newPassword">新密码</label>
            <input id="newPassword" name="newPassword" type="password" required>
          </div>
          <div class="form-field">
            <label for="newPassword2">确认新密码</label>
            <input id="newPassword2" name="newPassword2" type="password" required>
          </div>
          <button type="submit" class="btn btn-primary">修改密码</button>
          <span id="profilePwdMsg" class="profile-msg"></span>
        </form>
      </section>

      <section class="profile-card" style="grid-column:1 / -1;">
        <h2 class="profile-title">我发布的教材</h2>
        <div class="card-grid" id="myBookGrid"></div>
      </section>
    </div>
  </main>
</div>
<script src="assets/app.js"></script>
</body>
</html>
